name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CLAWHUB_SKILL_DIR: .codebuddy/skills/p4u

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install packaging tools
        run: sudo apt-get install -y zip jq

      - name: Run tests
        run: go test ./...

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            BUILD_VERSION="${{ github.ref_name }}"
            TAG_NAME="${{ github.ref_name }}"
            IS_TAG=true
          else
            BUILD_VERSION="sha-$(git rev-parse --short HEAD)"
            TAG_NAME="nightly"
            IS_TAG=false
          fi
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "is_tag=${IS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-X main.version=${BUILD_VERSION} -s -w"

          GOOS=linux   GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-linux-amd64       .
          GOOS=linux   GOARCH=arm64  go build -ldflags "${LDFLAGS}" -o dist/p4u-linux-arm64        .
          GOOS=darwin  GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64  go build -ldflags "${LDFLAGS}" -o dist/p4u-darwin-arm64      .
          GOOS=windows GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-windows-amd64.exe .

          echo "Built binaries:"
          ls -lh dist/

      - name: Package skill
        env:
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
        run: |
          set -euo pipefail
          PUBLISHED_AT=$(date -u +%s%3N)

          for dir in .claude/skills/p4u .codebuddy/skills/p4u; do
            jq \
              --arg v  "${BUILD_VERSION}" \
              --argjson ts "${PUBLISHED_AT}" \
              --arg url "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
              '.latest = {version: $v, publishedAt: $ts, commit: $url}' \
              "${dir}/_meta.json" > "${dir}/_meta.json.tmp"
            mv "${dir}/_meta.json.tmp" "${dir}/_meta.json"
          done

          # Pack with path p4u/ at zip root — unzip -d ~/.codebuddy/skills/ works directly
          mkdir -p /tmp/skill-stage/p4u
          cp .codebuddy/skills/p4u/SKILL.md /tmp/skill-stage/p4u/
          cp .codebuddy/skills/p4u/_meta.json /tmp/skill-stage/p4u/
          cd /tmp/skill-stage
          zip -r "$OLDPWD/dist/skill-p4u.zip" p4u/
          cd "$OLDPWD"
          echo "Contents of skill-p4u.zip:"
          unzip -l dist/skill-p4u.zip

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish latest release (branch push)
        if: steps.version.outputs.is_tag == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (latest main)"
          prerelease: true
          target_commitish: ${{ github.sha }}
          body: |
            ## p4u nightly

            Automatically updated on every push to `main`. Use a tagged version for stable releases.

            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Install binary — macOS / Linux
            ```bash
            OS=$(uname -s | tr '[:upper:]' '[:lower:]') && ARCH=$(uname -m)
            [[ "$ARCH" == "x86_64" ]] && ARCH=amd64 || ARCH=arm64
            curl -fsSL "https://github.com/m9rco/p4u-skill/releases/download/nightly/p4u-${OS}-${ARCH}" \
              -o /tmp/p4u && chmod +x /tmp/p4u && sudo mv /tmp/p4u /usr/local/bin/p4u
            ```

            ### Install binary — Windows (PowerShell)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/m9rco/p4u-skill/releases/download/nightly/p4u-windows-amd64.exe" `
              -OutFile "$env:USERPROFILE\AppData\Local\Microsoft\WindowsApps\p4u.exe"
            ```

            ### Install skill (Claude Code / CodeBuddy Code)
            ```bash
            # user-level
            mkdir -p ~/.codebuddy/skills
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/download/nightly/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d ~/.codebuddy/skills/

            # project-level
            mkdir -p .codebuddy/skills
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/download/nightly/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d .codebuddy/skills/
            ```
          files: |
            dist/p4u-linux-amd64
            dist/p4u-linux-arm64
            dist/p4u-darwin-amd64
            dist/p4u-darwin-arm64
            dist/p4u-windows-amd64.exe
            dist/skill-p4u.zip
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Publish versioned release (tag push)
        if: steps.version.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          make_latest: true
          body: |
            ## p4u ${{ steps.version.outputs.tag }}

            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Download

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux    | x86_64      | `p4u-linux-amd64` |
            | Linux    | arm64       | `p4u-linux-arm64` |
            | macOS    | Intel       | `p4u-darwin-amd64` |
            | macOS    | Apple Silicon | `p4u-darwin-arm64` |
            | Windows  | x86_64      | `p4u-windows-amd64.exe` |

            ### Install binary — macOS / Linux
            ```bash
            OS=$(uname -s | tr '[:upper:]' '[:lower:]') && ARCH=$(uname -m)
            [[ "$ARCH" == "x86_64" ]] && ARCH=amd64 || ARCH=arm64
            curl -fsSL "https://github.com/m9rco/p4u-skill/releases/download/${{ steps.version.outputs.tag }}/p4u-${OS}-${ARCH}" \
              -o /tmp/p4u && chmod +x /tmp/p4u && sudo mv /tmp/p4u /usr/local/bin/p4u
            ```

            ### Install binary — Windows (PowerShell)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/m9rco/p4u-skill/releases/download/${{ steps.version.outputs.tag }}/p4u-windows-amd64.exe" `
              -OutFile "$env:USERPROFILE\AppData\Local\Microsoft\WindowsApps\p4u.exe"
            ```

            ### Install skill (Claude Code / CodeBuddy Code)
            ```bash
            # user-level
            mkdir -p ~/.codebuddy/skills
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/download/${{ steps.version.outputs.tag }}/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d ~/.codebuddy/skills/

            # project-level
            mkdir -p .codebuddy/skills
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/download/${{ steps.version.outputs.tag }}/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d .codebuddy/skills/
            ```

            ### Verify checksums
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            dist/p4u-linux-amd64
            dist/p4u-linux-arm64
            dist/p4u-darwin-amd64
            dist/p4u-darwin-arm64
            dist/p4u-windows-amd64.exe
            dist/skill-p4u.zip
            dist/checksums.txt
          fail_on_unmatched_files: true

      - name: Publish skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          IS_TAG: ${{ steps.version.outputs.is_tag }}
        run: |
          set -euo pipefail
          if [[ -z "${CLAWHUB_TOKEN:-}" ]]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish"
            exit 0
          fi

          npm i -g clawhub --silent

          # Patch clawhub publish.js to inject acceptLicenseTerms:true into the
          # API payload — the server requires it but the current CLI (0.7.0) does
          # not send it yet.
          CLAWHUB_PUBLISH_JS="$(npm root -g)/clawhub/dist/cli/commands/publish.js"
          node - "$CLAWHUB_PUBLISH_JS" <<'PATCH_EOF'
const fs = require('fs');
const path = process.argv[2];
let src = fs.readFileSync(path, 'utf8');
// Only patch once
if (!src.includes('acceptLicenseTerms')) {
  src = src.replace(
    '...(forkOf ? { forkOf } : {}),',
    '...(forkOf ? { forkOf } : {}),\n            acceptLicenseTerms: true,'
  );
  fs.writeFileSync(path, src);
  console.log('Patched clawhub publish.js with acceptLicenseTerms:true');
} else {
  console.log('clawhub publish.js already patched');
}
PATCH_EOF

          clawhub login --token "${CLAWHUB_TOKEN}" --no-browser --label "ci"

          if [[ "${IS_TAG}" == "true" ]]; then
            CLAWHUB_VERSION="${BUILD_VERSION#v}"   # strip leading 'v' (e.g. v1.2.3 → 1.2.3)
            CHANGELOG="Release ${BUILD_VERSION}"
            CLAWHUB_TAGS="latest"
          else
            # Nightly: use 0.0.0-nightly.<short-sha> as a pre-release semver
            SHORT_SHA=$(git rev-parse --short HEAD)
            CLAWHUB_VERSION="0.0.0-nightly.${SHORT_SHA}"
            CHANGELOG="Nightly build from commit ${SHORT_SHA}"
            CLAWHUB_TAGS="nightly"
          fi

          clawhub publish "${CLAWHUB_SKILL_DIR}" \
            --slug      p4u \
            --name      "p4u" \
            --version   "${CLAWHUB_VERSION}" \
            --changelog "${CHANGELOG}" \
            --tags      "${CLAWHUB_TAGS}" \
            --no-input
