name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Compute version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${VERSION} -s -w"

          GOOS=linux   GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-linux-amd64       .
          GOOS=linux   GOARCH=arm64  go build -ldflags "${LDFLAGS}" -o dist/p4u-linux-arm64        .
          GOOS=darwin  GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64  go build -ldflags "${LDFLAGS}" -o dist/p4u-darwin-arm64      .
          GOOS=windows GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-windows-amd64.exe .

      - name: Package skill
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PUBLISHED_AT=$(date -u +%s%3N)

          # Update _meta.json in both skill directories
          for dir in .claude/skills/p4u .codebuddy/skills/p4u; do
            jq \
              --arg v  "${VERSION}" \
              --argjson ts "${PUBLISHED_AT}" \
              --arg url "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
              '.latest = {version: $v, publishedAt: $ts, commit: $url}' \
              "${dir}/_meta.json" > "${dir}/_meta.json.tmp"
            mv "${dir}/_meta.json.tmp" "${dir}/_meta.json"
          done

          # Pack the canonical (.claude) skill directory
          mkdir -p dist
          tar -czf dist/skill-p4u.tar.gz -C .claude/skills p4u
          echo "Packed skill-p4u.tar.gz:"
          tar -tzvf dist/skill-p4u.tar.gz

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: |
            ## p4u ${{ steps.version.outputs.version }}

            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Branch:** `${{ github.ref_name }}`

            ### Download

            | Platform | Architecture | Binary |
            |----------|-------------|--------|
            | Linux    | x86_64      | `p4u-linux-amd64` |
            | Linux    | arm64       | `p4u-linux-arm64` |
            | macOS    | Intel       | `p4u-darwin-amd64` |
            | macOS    | Apple Silicon | `p4u-darwin-arm64` |
            | Windows  | x86_64      | `p4u-windows-amd64.exe` |

            ### Install (macOS/Linux)
            ```bash
            # macOS Apple Silicon
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/p4u-darwin-arm64 \
              -o /tmp/p4u && chmod +x /tmp/p4u && sudo mv /tmp/p4u /usr/local/bin/

            # Linux x86_64
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/p4u-linux-amd64 \
              -o /tmp/p4u && chmod +x /tmp/p4u && sudo mv /tmp/p4u /usr/local/bin/
            ```

            ### Install skill (Claude Code / CodeBuddy Code)
            ```bash
            # project-level
            mkdir -p .claude/skills
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/skill-p4u.tar.gz \
              | tar -xz -C .claude/skills/

            # user-level (all projects)
            mkdir -p ~/.claude/skills
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/skill-p4u.tar.gz \
              | tar -xz -C ~/.claude/skills/
            ```

            ### Verify checksums
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            dist/p4u-linux-amd64
            dist/p4u-linux-arm64
            dist/p4u-darwin-amd64
            dist/p4u-darwin-arm64
            dist/p4u-windows-amd64.exe
            dist/skill-p4u.tar.gz
            dist/checksums.txt
          make_latest: true
          fail_on_unmatched_files: true
