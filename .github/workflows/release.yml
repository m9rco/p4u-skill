name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Compute version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            IS_TAG=true
          else
            VERSION="latest"
            IS_TAG=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_tag=${IS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          LDFLAGS="-X main.version=${VERSION} -s -w"

          GOOS=linux   GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-linux-amd64       .
          GOOS=linux   GOARCH=arm64  go build -ldflags "${LDFLAGS}" -o dist/p4u-linux-arm64        .
          GOOS=darwin  GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-darwin-amd64      .
          GOOS=darwin  GOARCH=arm64  go build -ldflags "${LDFLAGS}" -o dist/p4u-darwin-arm64      .
          GOOS=windows GOARCH=amd64  go build -ldflags "${LDFLAGS}" -o dist/p4u-windows-amd64.exe .

      - name: Install packaging tools
        run: sudo apt-get install -y zip jq

      - name: Package skill
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PUBLISHED_AT=$(date -u +%s%3N)

          # Stamp _meta.json in both skill directories
          for dir in .claude/skills/p4u .codebuddy/skills/p4u; do
            jq \
              --arg v  "${VERSION}" \
              --argjson ts "${PUBLISHED_AT}" \
              --arg url "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
              '.latest = {version: $v, publishedAt: $ts, commit: $url}' \
              "${dir}/_meta.json" > "${dir}/_meta.json.tmp"
            mv "${dir}/_meta.json.tmp" "${dir}/_meta.json"
          done

          # Pack both skill directories into a single zip
          mkdir -p dist
          zip -r dist/skill-p4u.zip .claude/skills/p4u/ .codebuddy/skills/p4u/
          echo "Packed skill-p4u.zip:"
          unzip -l dist/skill-p4u.zip

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create or update latest release (branch push)
        if: steps.version.outputs.is_tag == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest"
          prerelease: true
          body: |
            ## p4u latest

            This release is automatically updated on every push to `main`.
            For a stable release, use a tagged version.

            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Install binary (macOS/Linux)
            ```bash
            OS=$(uname -s | tr '[:upper:]' '[:lower:]') && ARCH=$(uname -m)
            [[ "$ARCH" == "x86_64" ]] && ARCH=amd64 || ARCH=arm64
            curl -fsSL "https://github.com/m9rco/p4u-skill/releases/latest/download/p4u-${OS}-${ARCH}" \
              -o /tmp/p4u && chmod +x /tmp/p4u && sudo mv /tmp/p4u /usr/local/bin/p4u
            ```

            ### Install binary (Windows)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/m9rco/p4u-skill/releases/latest/download/p4u-windows-amd64.exe" `
              -OutFile "$env:USERPROFILE\AppData\Local\Microsoft\WindowsApps\p4u.exe"
            ```

            ### Install skill (Claude Code / CodeBuddy Code)
            ```bash
            # project-level (unzips to .claude/skills/p4u/ and .codebuddy/skills/p4u/)
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d .

            # user-level
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d ~
            ```
          files: |
            dist/p4u-linux-amd64
            dist/p4u-linux-arm64
            dist/p4u-darwin-amd64
            dist/p4u-darwin-arm64
            dist/p4u-windows-amd64.exe
            dist/skill-p4u.zip
            dist/checksums.txt
          make_latest: false
          fail_on_unmatched_files: true

      - name: Create versioned release (tag push)
        if: steps.version.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.version }}"
          body: |
            ## p4u ${{ steps.version.outputs.version }}

            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Download

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux    | x86_64      | `p4u-linux-amd64` |
            | Linux    | arm64       | `p4u-linux-arm64` |
            | macOS    | Intel       | `p4u-darwin-amd64` |
            | macOS    | Apple Silicon | `p4u-darwin-arm64` |
            | Windows  | x86_64      | `p4u-windows-amd64.exe` |

            ### Install binary (macOS/Linux)
            ```bash
            OS=$(uname -s | tr '[:upper:]' '[:lower:]') && ARCH=$(uname -m)
            [[ "$ARCH" == "x86_64" ]] && ARCH=amd64 || ARCH=arm64
            curl -fsSL "https://github.com/m9rco/p4u-skill/releases/latest/download/p4u-${OS}-${ARCH}" \
              -o /tmp/p4u && chmod +x /tmp/p4u && sudo mv /tmp/p4u /usr/local/bin/p4u
            ```

            ### Install binary (Windows)
            ```powershell
            Invoke-WebRequest -Uri "https://github.com/m9rco/p4u-skill/releases/latest/download/p4u-windows-amd64.exe" `
              -OutFile "$env:USERPROFILE\AppData\Local\Microsoft\WindowsApps\p4u.exe"
            ```

            ### Install skill (Claude Code / CodeBuddy Code)
            ```bash
            # project-level (unzips to .claude/skills/p4u/ and .codebuddy/skills/p4u/)
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d .

            # user-level
            curl -fsSL https://github.com/m9rco/p4u-skill/releases/latest/download/skill-p4u.zip \
              -o /tmp/skill-p4u.zip && unzip -o /tmp/skill-p4u.zip -d ~
            ```

            ### Verify checksums
            ```bash
            sha256sum -c checksums.txt
            ```
          files: |
            dist/p4u-linux-amd64
            dist/p4u-linux-arm64
            dist/p4u-darwin-amd64
            dist/p4u-darwin-arm64
            dist/p4u-windows-amd64.exe
            dist/skill-p4u.zip
            dist/checksums.txt
          make_latest: true
          fail_on_unmatched_files: true
